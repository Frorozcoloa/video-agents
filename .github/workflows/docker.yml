name: Docker Build & Verify

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - 'openspec/**'

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: video-agents:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Start container
        run: docker run -d --name video-agents-test -p 8000:8000 video-agents:ci

      - name: Wait for server to accept connections
        run: |
          echo "Waiting for port 8000..."
          for i in $(seq 1 20); do
            if nc -zv localhost 8000 2>/dev/null; then
              echo "Port 8000 is open after $i attempt(s)."
              exit 0
            fi
            echo "Attempt $i/20 — retrying in 2s..."
            sleep 2
          done
          echo "Server did not become ready in time."
          docker logs video-agents-test
          exit 1

      - name: Verify SSE endpoint responds
        run: |
          # SSE connections are long-lived; just verify the server replies with HTTP headers
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 5 http://localhost:8000/sse || true)
          echo "SSE endpoint status: $STATUS"
          # 200 (SSE streaming) or 405/404 both confirm the server is alive
          if [ "$STATUS" = "000" ]; then
            echo "No response from server."
            docker logs video-agents-test
            exit 1
          fi
          echo "Server responded with HTTP $STATUS — container is healthy."

      - name: Show server logs
        if: always()
        run: docker logs video-agents-test || true

      - name: Stop container
        if: always()
        run: docker rm -f video-agents-test || true

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
      - id: check-toml

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.0
    hooks:
      - id: ruff
        args: [ --fix ]      # Corrige automáticamente lo que pueda
      - id: ruff-format      # Reemplaza a Black para formateo ultra rápido

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.15.0
    hooks:
      - id: mypy             # Chequeo de tipos estáticos
        additional_dependencies: [types-requests] # Añade tipos de tus librerías aquí
